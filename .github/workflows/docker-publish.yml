name: Deploy Gluttex Stack

on:
  push:
    branches:
      - main  # Only deploy on main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # - name: Install test dependencies
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install -r ./requirements.txt
      #     pip install httpx pytest python-multipart pytest-asyncio

      # - name: Run Auth Server tests
      #   run: |
      #     pytest ./

      # Build your images (auth, fs, api, etc.)
      - name: Build Docker images
        run: |
          docker build -t emastan-auth ./
      
      # Start containers with docker-compose (auth, fs, api)
      - name: Start containers
        run: |
          docker compose up -d
          sleep 30  # give services time to start
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2


      # Build & push Auth
      - name: Build and Push Auth Image
        uses: docker/build-push-action@v5
        with:
          context: ./
          push: true
          tags: omarzos/emastan-auth:latest


        

